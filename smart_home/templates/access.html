<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="access.title">门禁管理 - 智能家居</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span data-i18n="system.title">智能家居控制系统</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link" data-i18n="nav.dashboard">仪表盘</a>
            <a href="/history" class="nav-link" data-i18n="nav.history">历史数据</a>
            <a href="/access" class="nav-link active" data-i18n="nav.access">门禁管理</a>
            <a href="/hardware" class="nav-link" data-i18n="nav.hardware">硬件管理</a>
        </div>
        <div class="nav-status">
            <span class="status-dot online"></span>
            <span data-i18n="system.online">系统在线</span>
            <span id="currentTime" class="time-display">--:--:--</span>
        </div>
        <button class="lang-switch" onclick="setLang(I18N.currentLang === 'zh' ? 'en' : 'zh')" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
            </svg>
            <span data-i18n="nav.lang">EN</span>
        </button>
    </nav>

    <div id="notification" class="notification hidden"></div>

    <main class="main-content">
        <div class="dashboard-grid grid-2-1">
            <!-- 实时识别结果面板 -->
            <div class="card card-access-panel">
                <div class="card-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="card-icon">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <circle cx="12" cy="16" r="1"/>
                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    <h3 data-i18n="access.live_face">实时人脸识别</h3>
                    <span class="face-poll-status" id="pollStatus">
                        <span class="status-dot online"></span>
                        <span data-i18n="access.listening">监听中</span>
                    </span>
                </div>
                <div class="card-body">
                    <!-- 最新识别结果展示 -->
                    <div class="face-result-display" id="faceResultDisplay">
                        <div class="face-result-waiting" id="faceResultWaiting">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="face-waiting-icon">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 8v4l3 3"/>
                            </svg>
                            <p data-i18n="access.waiting_push">等待香橙派推送识别结果...</p>
                            <p class="face-waiting-sub" data-i18n="access.waiting_sub">人脸识别在香橙派上独立运行</p>
                        </div>
                        <div class="face-result-content hidden" id="faceResultContent">
                            <div class="face-result-status" id="faceResultStatus">
                                <div class="face-result-icon" id="faceResultIcon"></div>
                                <div class="face-result-info">
                                    <div class="face-result-name" id="faceResultName">--</div>
                                    <div class="face-result-meta" id="faceResultMeta">--</div>
                                </div>
                            </div>
                            <div class="face-result-detail">
                                <div class="detail-row">
                                    <span class="detail-label" data-i18n="access.face_id">人脸ID</span>
                                    <span class="detail-value" id="faceResultId">--</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label" data-i18n="access.confidence">置信度</span>
                                    <span class="detail-value" id="faceResultConfidence">--</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label" data-i18n="access.time">识别时间</span>
                                    <span class="detail-value" id="faceResultTime">--</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label" data-i18n="access.source">识别来源</span>
                                    <span class="detail-value" id="faceResultSource">--</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 模拟推送按钮（测试用） -->
                    <div class="access-result" id="accessResult"></div>
                    <div class="btn-group" style="margin-top:16px">
                        <button class="btn" onclick="simulatePush('FACE001', 0.95)" data-i18n="access.sim_admin">模拟推送 - 管理员</button>
                        <button class="btn" onclick="simulatePush('FACE002', 0.88)" data-i18n="access.sim_family">模拟推送 - 家庭成员A</button>
                        <button class="btn btn-danger" onclick="simulatePush('FACE999', 0.45)" data-i18n="access.sim_unknown">模拟推送 - 未知人员</button>
                    </div>
                </div>
            </div>

            <!-- 授权人员管理 -->
            <div class="card card-persons">
                <div class="card-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="card-icon">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
                    </svg>
                    <h3 data-i18n="access.persons">授权人员</h3>
                </div>
                <div class="card-body">
                    <div class="person-list" id="personList">
                        <div class="loading" data-i18n="history.loading">加载中...</div>
                    </div>
                    <div class="add-person">
                        <h4 data-i18n="access.add_person">添加授权人员</h4>
                        <div class="form-row">
                            <input type="text" id="newPersonName" placeholder="姓名" class="input-field" data-i18n-placeholder="access.name">
                            <input type="text" id="newPersonRFID" placeholder="人脸ID" class="input-field" data-i18n-placeholder="access.face_id">
                            <button class="btn" onclick="addPerson()" data-i18n="access.add">添加</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 人脸识别事件记录 -->
        <div class="card card-table" style="margin-top:20px">
            <div class="card-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="card-icon">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                <h3 data-i18n="access.face_events">人脸识别事件</h3>
                <button class="btn btn-sm" onclick="loadFaceEvents()" data-i18n="access.refresh">刷新</button>
            </div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th data-i18n="access.event_time">时间</th>
                                <th data-i18n="access.event_person">人员</th>
                                <th data-i18n="access.event_face_id">人脸ID</th>
                                <th data-i18n="access.event_confidence">置信度</th>
                                <th data-i18n="access.event_status">验证状态</th>
                                <th data-i18n="access.event_source">来源</th>
                            </tr>
                        </thead>
                        <tbody id="faceEventBody">
                            <tr><td colspan="6" data-i18n="history.loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 门禁日志 -->
        <div class="card card-table" style="margin-top:20px">
            <div class="card-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="card-icon">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                <h3 data-i18n="access.logs">门禁访问日志</h3>
                <button class="btn btn-sm" onclick="loadAccessLogs()" data-i18n="access.refresh">刷新</button>
            </div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th data-i18n="access.log_time">时间</th>
                                <th data-i18n="access.log_person">人员</th>
                                <th data-i18n="access.log_method">验证方式</th>
                                <th data-i18n="access.log_status">状态</th>
                            </tr>
                        </thead>
                        <tbody id="accessLogBody">
                            <tr><td colspan="4" data-i18n="history.loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/lang.js') }}"></script>
    <script src="{{ url_for('static', filename='js/access.js') }}"></script>
</body>
</html>
