<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="access.title">门禁管理 - 智能家居</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span data-i18n="system.title">智能家居控制系统</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link" data-i18n="nav.dashboard">仪表盘</a>
            <a href="/history" class="nav-link" data-i18n="nav.history">历史数据</a>
            <a href="/access" class="nav-link active" data-i18n="nav.access">门禁管理</a>
            <a href="/hardware" class="nav-link" data-i18n="nav.hardware">硬件管理</a>
        </div>
        <div class="nav-status">
            <span class="status-dot online"></span>
            <span data-i18n="system.online">系统在线</span>
            <span id="currentTime" class="time-display">--:--:--</span>
        </div>
        <button class="lang-switch" onclick="setLang(I18N.currentLang === 'zh' ? 'en' : 'zh')" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
            </svg>
            <span data-i18n="nav.lang">EN</span>
        </button>
    </nav>

    <div id="notification" class="notification hidden"></div>

    <main class="main-content">
        <div class="dashboard-grid grid-2-1">
            <!-- 门禁验证面板 -->
            <div class="card card-access-panel">
                <div class="card-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="card-icon">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <circle cx="12" cy="16" r="1"/>
                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    <h3 data-i18n="access.verify">门禁验证 (模拟)</h3>
                </div>
                <div class="card-body">
                    <!-- 摄像头画面 -->
                    <div class="face-camera" id="faceCamera">
                        <video id="faceVideo" autoplay playsinline muted></video>
                        <canvas id="faceCanvas" style="display:none"></canvas>
                        <div class="face-overlay" id="faceOverlay">
                            <div class="face-guide">
                                <svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.5" class="face-guide-svg">
                                    <ellipse cx="100" cy="85" rx="55" ry="65"/>
                                    <circle cx="100" cy="85" r="42"/>
                                    <ellipse cx="70" cy="72" rx="12" ry="8"/>
                                    <ellipse cx="130" cy="72" rx="12" ry="8"/>
                                    <circle cx="100" cy="90" r="5"/>
                                    <path d="M85 105 Q100 115 115 105" fill="none"/>
                                    <circle cx="100" cy="160" r="18"/>
                                </svg>
                                <span class="face-guide-label">人脸识别</span>
                            </div>
                        </div>
                        <div class="face-scanning-ring" id="scanningRing">
                            <div class="scanning-corner tl"></div>
                            <div class="scanning-corner tr"></div>
                            <div class="scanning-corner bl"></div>
                            <div class="scanning-corner br"></div>
                        </div>
                        <div class="face-status-indicator" id="faceIndicator">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="face-icon">
                                <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 6l-5 5"/>
                            </svg>
                            <span data-i18n="access.face_wait">等待人脸识别...</span>
                        </div>
                    </div>
                    <div class="access-result" id="accessResult"></div>
                    <div class="btn-group" style="margin-top:16px">
                        <button class="btn" onclick="simulateFace('admin')" data-i18n="access.face_admin">人脸识别 - 管理员</button>
                        <button class="btn" onclick="simulateFace('family_a')" data-i18n="access.face_family">人脸识别 - 家庭成员A</button>
                        <button class="btn btn-danger" onclick="simulateFace('unknown')" data-i18n="access.face_unknown">人脸识别 - 未授权</button>
                        <button class="btn" onclick="startCamera()" data-i18n="access.camera_start" style="margin-left:auto">启动摄像头</button>
                    </div>
                </div>
            </div>

            <!-- 授权人员管理 -->
            <div class="card card-persons">
                <div class="card-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="card-icon">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
                    </svg>
                    <h3 data-i18n="access.persons">授权人员</h3>
                </div>
                <div class="card-body">
                    <div class="person-list" id="personList">
                        <div class="loading" data-i18n="history.loading">加载中...</div>
                    </div>
                    <div class="add-person">
                        <h4 data-i18n="access.add_person">添加授权人员</h4>
                        <div class="form-row">
                            <input type="text" id="newPersonName" placeholder="姓名" class="input-field" data-i18n-placeholder="access.name">
                            <input type="text" id="newPersonRFID" placeholder="人脸ID" class="input-field" data-i18n-placeholder="access.face_id">
                            <button class="btn" onclick="addPerson()" data-i18n="access.add">添加</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 门禁日志 -->
        <div class="card card-table" style="margin-top:20px">
            <div class="card-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="card-icon">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                <h3 data-i18n="access.logs">门禁访问日志</h3>
                <button class="btn btn-sm" onclick="loadAccessLogs()" data-i18n="access.refresh">刷新</button>
            </div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th data-i18n="access.log_time">时间</th>
                                <th data-i18n="access.log_person">人员</th>
                                <th data-i18n="access.log_method">验证方式</th>
                                <th data-i18n="access.log_status">状态</th>
                            </tr>
                        </thead>
                        <tbody id="accessLogBody">
                            <tr><td colspan="4" data-i18n="history.loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/lang.js') }}"></script>
    <script src="{{ url_for('static', filename='js/access.js') }}"></script>
</body>
</html>
