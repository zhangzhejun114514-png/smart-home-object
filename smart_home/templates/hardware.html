<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="system.title">智能家居控制系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span data-i18n="system.title">智能家居控制系统</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link"><span data-i18n="nav.dashboard">仪表盘</span></a>
            <a href="/history" class="nav-link"><span data-i18n="nav.history">历史数据</span></a>
            <a href="/access" class="nav-link"><span data-i18n="nav.access">门禁管理</span></a>
            <a href="/hardware" class="nav-link active"><span data-i18n="nav.hardware">硬件管理</span></a>
        </div>
        <div class="nav-status">
            <span class="status-dot online"></span>
            <span data-i18n="system.online">系统在线</span>
            <span id="currentTime" class="time-display">--:--:--</span>
        </div>
        <button class="lang-switch" onclick="setLang(I18N.currentLang === 'zh' ? 'en' : 'zh')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
            </svg>
            <span data-i18n="nav.lang">EN</span>
        </button>
    </nav>

    <div id="notification" class="notification hidden"></div>

    <main class="main-content">
        <!-- 连接配置卡片 -->
        <div class="card">
            <div class="card-header">
                <h3 data-i18n="ha.config_title">Home Assistant 连接配置</h3>
                <span class="ha-status-badge" id="haStatus">未连接</span>
            </div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group">
                        <label data-i18n="ha.url">HA 地址 <span class="readonly-badge" data-i18n="ha.fixed">已固定</span></label>
                        <input type="text" id="haUrl" class="input-field input-readonly" value="http://10.29.127.49:8123" readonly>
                    </div>
                    <div class="form-group">
                        <label>Long-Lived Access Token <span class="readonly-badge" data-i18n="ha.fixed">已固定</span></label>
                        <input type="password" id="haToken" class="input-field input-readonly" value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiIzNjIzMjc4ZDJkM2Y0OWY0OGQ4OTNkYmZmMTA5ZjMzNCIsImlhdCI6MTc4MzQ0MzQ4NCwiZXhwIjoyMDk4ODAzNDg0fQ.EefvZwsihQiUdk8RoAoz3n-cCWayw5uzd0Eao1Fx4NY" readonly>
                    </div>
                </div>
                <div class="btn-group" style="margin-top:12px">
                    <button class="btn" onclick="testConnection()" data-i18n="ha.test">测试连接</button>
                    <button class="btn" onclick="saveConfig()" data-i18n="ha.save">保存配置</button>
                    <button class="btn" onclick="discoverDevices()" data-i18n="ha.discover">发现设备</button>
                </div>
                <div id="haInfo" class="ha-info" style="margin-top:16px"></div>
            </div>
        </div>

        <!-- 设备映射表 -->
        <div class="card" style="margin-top:20px">
            <div class="card-header">
                <h3 data-i18n="ha.mapping_title">设备映射配置</h3>
                <span class="card-subtitle" data-i18n="ha.mapping_subtitle">将HA实体映射到系统功能</span>
            </div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table class="data-table" id="mappingTable">
                        <thead>
                            <tr>
                                <th data-i18n="ha.device_type">设备类型</th>
                                <th data-i18n="ha.entity_id">HA 实体 ID</th>
                                <th data-i18n="ha.current_state">当前状态</th>
                                <th data-i18n="ha.action">操作</th>
                            </tr>
                        </thead>
                        <tbody id="mappingBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 已发现设备列表 -->
        <div class="card" style="margin-top:20px">
            <div class="card-header">
                <h3 data-i18n="ha.devices_title">已发现设备</h3>
                <span class="card-subtitle" id="deviceCount" data-i18n="ha.device_count">0 个设备</span>
            </div>
            <div class="card-body">
                <div class="table-wrapper" style="max-height:400px">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Entity ID</th>
                                <th data-i18n="ha.friendly_name">名称</th>
                                <th data-i18n="ha.state">状态</th>
                                <th data-i18n="ha.domain">域</th>
                                <th data-i18n="ha.action">操作</th>
                            </tr>
                        </thead>
                        <tbody id="deviceListBody">
                            <tr><td colspan="5" data-i18n="ha.click_discover">点击"发现设备"加载</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 快捷硬件控制 -->
        <div class="card card-remote" style="margin-top:20px">
            <div class="card-header">
                <h3 data-i18n="ha.quick_control">快捷硬件控制</h3>
                <span class="card-subtitle" data-i18n="ha.quick_subtitle">通过 HA 直接控制硬件设备</span>
            </div>
            <div class="card-body">
                <div class="remote-grid">
                    <div class="remote-device" onclick="haAction('light','on')">
                        <div class="remote-icon light-on-icon"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg></div>
                        <span data-i18n="ha.light_on">开灯</span>
                    </div>
                    <div class="remote-device" onclick="haAction('light','off')">
                        <div class="remote-icon light-off-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="6"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></div>
                        <span data-i18n="ha.light_off">关灯</span>
                    </div>
                    <div class="remote-device" onclick="haAction('ac','on')">
                        <div class="remote-icon ac-on-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M6 21h12"/></svg></div>
                        <span data-i18n="ha.ac_on">开空调</span>
                    </div>
                    <div class="remote-device" onclick="haAction('ac','off')">
                        <div class="remote-icon ac-off-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
                        <span data-i18n="ha.ac_off">关空调</span>
                    </div>
                    <div class="remote-device" onclick="haAction('fan','on')">
                        <div class="remote-icon fan-on-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4"/></svg></div>
                        <span data-i18n="ha.fan_on">开风扇</span>
                    </div>
                    <div class="remote-device" onclick="haAction('fan','off')">
                        <div class="remote-icon fan-off-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/></svg></div>
                        <span data-i18n="ha.fan_off">关风扇</span>
                    </div>
                    <div class="remote-device" onclick="haAction('door','unlock')">
                        <div class="remote-icon door-open-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="16" r="1"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
                        <span data-i18n="ha.unlock">开锁</span>
                    </div>
                    <div class="remote-device" onclick="haAction('door','lock')">
                        <div class="remote-icon door-close-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="16" r="1"/><path d="M7 11V7a5 5 0 0110 0v4"/><line x1="17" y1="15" x2="17" y2="17"/><line x1="17" y1="11" x2="17" y2="13"/></svg></div>
                        <span data-i18n="ha.lock">上锁</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/lang.js') }}"></script>
    <script src="{{ url_for('static', filename='js/hardware.js') }}"></script>
</body>
</html>
