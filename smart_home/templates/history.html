<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史数据 - 智能家居</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span>智能家居控制系统</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">仪表盘</a>
            <a href="/history" class="nav-link active">历史数据</a>
            <a href="/access" class="nav-link">门禁管理</a>
        </div>
        <div class="nav-status">
            <span class="status-dot online"></span>
            <span>系统在线</span>
            <span id="currentTime" class="time-display">--:--:--</span>
        </div>
    </nav>

    <div id="notification" class="notification hidden"></div>

    <main class="main-content">
        <!-- 时间筛选 -->
        <div class="card card-filter">
            <div class="card-body">
                <div class="filter-row">
                    <label>数据类型:</label>
                    <select id="dataType" onchange="loadHistory()" class="select-input">
                        <option value="temperature">温度</option>
                        <option value="humidity">湿度</option>
                        <option value="door_window">门窗状态</option>
                        <option value="light">灯光状态</option>
                    </select>
                    <label>时间范围:</label>
                    <select id="timeRange" onchange="loadHistory()" class="select-input">
                        <option value="1">最近1小时</option>
                        <option value="6">最近6小时</option>
                        <option value="12">最近12小时</option>
                        <option value="24" selected>最近24小时</option>
                        <option value="72">最近3天</option>
                        <option value="168">最近7天</option>
                    </select>
                    <button class="btn" onclick="loadHistory()">刷新数据</button>
                </div>
            </div>
        </div>

        <!-- 统计概览 -->
        <div class="dashboard-grid grid-4">
            <div class="card card-stat">
                <div class="card-body stat-body">
                    <span class="stat-label">最高温度</span>
                    <span class="stat-value" id="statMax">--</span>
                    <span class="stat-unit">°C</span>
                </div>
            </div>
            <div class="card card-stat">
                <div class="card-body stat-body">
                    <span class="stat-label">最低温度</span>
                    <span class="stat-value" id="statMin">--</span>
                    <span class="stat-unit">°C</span>
                </div>
            </div>
            <div class="card card-stat">
                <div class="card-body stat-body">
                    <span class="stat-label">平均温度</span>
                    <span class="stat-value" id="statAvg">--</span>
                    <span class="stat-unit">°C</span>
                </div>
            </div>
            <div class="card card-stat">
                <div class="card-body stat-body">
                    <span class="stat-label">数据点数</span>
                    <span class="stat-value" id="statCount">--</span>
                    <span class="stat-unit">条</span>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="card card-chart-large">
            <div class="card-header">
                <h3 id="chartTitle">温度历史趋势</h3>
            </div>
            <div class="card-body chart-container-large">
                <canvas id="historyChart"></canvas>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="card card-table">
            <div class="card-header">
                <h3>详细记录</h3>
                <span class="card-subtitle" id="recordCount">共 0 条记录</span>
            </div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table class="data-table" id="historyTable">
                        <thead>
                            <tr id="tableHeader">
                                <th>时间</th>
                                <th>数值</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="2">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/history.js') }}"></script>
</body>
</html>
